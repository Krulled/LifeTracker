name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy-personal:
    name: Deploy — Personal (life-tracker-zach)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app life-tracker-zach --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PERSONAL }}

  deploy-friend:
    name: Deploy — Friend (life-tracker-friend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app life-tracker-friend --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FRIEND }}
