app = "life-tracker-nev"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/sleep_tracker.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "life_tracker_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
